[theme]
primaryColor = "#ffad1f"
backgroundColor = "#0a1628"
secondaryBackgroundColor = "#0d2240"
textColor = "#e8edf5"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
# Augmente la limite pour les imports Excel/CSV de ton WMS (50 Mo)
maxUploadSize = 50

[browser]
# Désactive les stats d'usage et masque les boutons Streamlit pour un look "App Pro"
gatherUsageStats = false
toolbarMode = "minimal"

[client]
# Masque les détails d'erreur pour les utilisateurs finaux
showErrorDetails = false
